<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSET OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F1410;color:#E8EDE4;font-family:'IBM Plex Mono',monospace;min-height:100vh}
#gate{display:flex;min-height:100vh;align-items:center;justify-content:center}
#app{display:none;padding:40px}
.box{background:#1A2118;border:1px solid #2A3828;border-radius:6px;padding:48px;width:420px;text-align:center}
input{width:100%;background:#0F1410;border:1px solid #2A3828;color:#E8EDE4;padding:14px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:3px;outline:none;margin-bottom:12px;text-align:center;display:block}
button{width:100%;background:#1E5C3A;color:#fff;border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;padding:14px;border-radius:3px;cursor:pointer}
#err{color:#EF4444;font-size:11px;margin-top:10px;display:none}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div style="font-size:20px;font-weight:700;margin-bottom:24px;color:#2D7A50">ASSET OS</div>
    <div style="font-size:11px;color:#6A7A68;margin-bottom:24px">Reclaim Solutions — Internal Platform</div>
    <input type="password" id="pw" placeholder="Enter password" />
    <button id="btn">ENTER THE PLATFORM</button>
    <div id="err"></div>
  </div>
</div>

<div id="app">
  <div style="font-size:22px;font-weight:700;margin-bottom:8px">Pipeline Dashboard</div>
  <div style="font-size:11px;color:#6A7A68">App loaded successfully</div>
</div>

<script>
document.getElementById('btn').addEventListener('click', function() {
  var pw = document.getElementById('pw').value;
  if (!pw) return;
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  btn.textContent = 'CHECKING...';
  btn.disabled = true;
  err.style.display = 'none';
  fetch('/.netlify/functions/check-pw', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: pw})
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      err.textContent = 'Incorrect password';
      err.style.display = 'block';
      document.getElementById('pw').value = '';
      btn.textContent = 'ENTER THE PLATFORM';
      btn.disabled = false;
    }
  })
  .catch(function(e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
    btn.textContent = 'ENTER THE PLATFORM';
    btn.disabled = false;
  });
});
</script>
</body>
</html>
