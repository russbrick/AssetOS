*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1410;--s1:#1A2118;--s2:#1F2A1D;--s3:#253024;

body{background:var(--bg);color:var(--tx);font-family:var(--ff);min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */

.gate-err{font-size:10px;color:var(–red);margin-top:10px;letter-spacing:1px}
input.gate-in{width:100%;background:var(–bg);border:1px solid var(–bd);color:var(–tx);padding:14px;font-size:13px;font-family:var(–ff);border-radius:3px;outline:none;margin-bottom:12px;letter-spacing:1px;text-align:center;transition:border-color .2s;display:block}
input.gate-in:focus{border-color:var(–acc)}
input.gate-in::placeholder{color:#3A4A38}
button.gate-btn{width:100%;background:#1E5C3A;color:#fff;border:none;font-family:var(–ff);font-size:11px;font-weight:700;letter-spacing:2px;padding:14px;border-radius:3px;cursor:pointer;transition:background .15s}
button.gate-btn:hover{background:var(–acc)}
button.skip-btn{background:none;border:none;color:var(–td);font-size:10px;cursor:pointer;letter-spacing:1px;font-family:var(–ff);margin-top:12px;padding:8px;width:100%}

/* ── NAV ── */

#nav-tabs{display:flex;flex:1;overflow-x:auto}
.nav-tab{background:none;border:none;cursor:pointer;padding:0 14px;height:52px;display:flex;align-items:center;font-size:9px;font-family:var(–ff);font-weight:700;letter-spacing:1.5px;color:var(–td);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}

#nav-status{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:16px;font-size:9px}
.live-dot{width:6px;height:6px;background:var(–grn);border-radius:50%;animation:pulse 2s infinite}

/* ── CONTENT ── */

/* ── PIPELINE BAR ── */

/* ── QUICK ACTION ── */

const fmt = n => n >= 1000000 ? `$${(n/1000000).toFixed(1)}M` : n >= 1000 ? `$${Math.round(n/1000)}K` : `$${n}`;

async function callClaude(system, user) {
  const res = await fetch("/.netlify/functions/claude-proxy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      system: system,
      max_tokens: 2000,
      messages: [{role:"user", content:user}]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Proxy error");
  return data.content[0].text;
}

async function checkPw() {
  const val = document.getElementById("pw-input").value;
  if (!val) return;
  const btn = document.querySelector("#gate-pw .gate-btn");
  const errEl = document.getElementById("pw-err");
  btn.textContent = "CHECKING...";
  btn.disabled = true;
  errEl.style.display = "none";

  try {
    const res = await fetch("/.netlify/functions/check-pw", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: val })
    });
    const data = await res.json();

    if (data.ok) {
      sessionStorage.setItem("rs-auth", "1");
      document.getElementById("gate-pw").style.display = "none";
      launchApp();
    } else {
      errEl.textContent = data.error || "Incorrect password";
      errEl.style.display = "block";
      document.getElementById("pw-input").value = "";
      btn.textContent = "ENTER THE PLATFORM →";
      btn.disabled = false;
    }

`Estimate fair market recovery values for these assets${t?` from ${t.company} (${t.location}, ${t.industry})`:""}:\n\n${list}\n\nReturn JSON:\n{"assets":[{"name":"","qty":0,"unitLow":0,"unitHigh":0,"totalLow":0,"totalHigh":0,"confidence":"high|medium|low","channel":"","notes":""}],"totalLow":0,"totalHigh":0,"feeLow":0,"feeHigh":0,"timeline":"","topChannel":"","insight":""}`
);
state.valResult = JSON.parse(text.replace(/`json|`/g,””).trim());
} catch(e) { state.valError = “Valuation failed — try again.”; }
state.valLoading = false;
renderAll();
}

function renderPipeline() {
const totalPipeline = state.targets.filter(t=>t.stage!==“Prospecting”&&t.stage!==“Closed”).reduce((s,t)=>s+t.high,0);
const totalClosed   = state.targets.filter(t=>t.stage===“Closed”).reduce((s,t)=>s+t.high,0);

const cols = STAGES.map(stage=>{
const st  = state.targets.filter(t=>t.stage===stage);
const sv  = st.reduce((s,t)=>s+t.high,0);
const idx = STAGES.indexOf(stage);
const cards = st.map(t=>` <div class="deal-card"> <div style="font-size:11px;font-weight:700;margin-bottom:2px">${esc(t.company)}</div> <div style="font-size:9px;color:var(--td);margin-bottom:6px">${esc(t.location)}</div> <div style="font-size:12px;color:var(--grn);font-weight:700">${fmt(t.low)}-${fmt(t.high)}</div> <div style="font-size:9px;color:var(--acc);margin-bottom:8px">fee: ${fee(t.high)}</div> ${badge(t.priority)} <div style="display:flex;gap:4px;margin-top:8px"> ${idx>0?`<button style="flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--td);font-size:8px;padding:4px 2px;cursor:pointer;font-family:var(--ff);border-radius:2px" onclick="moveTarget(${t.id},-1)">← BACK</button>`:""} ${idx<STAGES.length-1?`<button style="flex:1;background:var(--adim);border:1px solid var(--acc);color:var(--acc);font-size:8px;padding:4px 2px;cursor:pointer;font-family:var(--ff);border-radius:2px" onclick="moveTarget(${t.id},1)">NEXT →</button>`:""} </div> </div>`).join(””);

```
return `
  <div class="stage-col">

      <div style="font-size:9px;font-weight:700;color:${STAGE_CLR[stage]};letter-spacing:1.5px">${stage.toUpperCase()}</div>
      <div style="font-size:10px;color:var(--td)">${st.length} deal${st.length!==1?"s":""}${sv>0?` <span style="color:var(--grn)">${fmt(sv)}</span>`:""}</div>

```

}).join(””);

}

function moveTarget(id, dir) {
const t = state.targets.find(x=>x.id===id);
if (!t) return;
const i = STAGES.indexOf(t.stage);
t.stage = STAGES[Math.min(Math.max(i+dir,0),STAGES.length-1)];
saveTargets();
renderAll();
}

const DOC_TYPES = [
{id:“capability”, label:“CAPABILITY STATEMENT”, desc:“One-pager for cold outreach”},
{id:“agreement”,  label:“FEE AGREEMENT”,        desc:“12% success fee contract”},

];

function renderDocs() {

```

  </div>
  ${outputArea}

```

}

async function generateDoc() {
state.docLoading = true; state.docText = “”; state.docError = “”;
renderAll();
const who = state.docName || “the consultant”, firm = state.docCompany || “Reclaim Solutions”;
const t   = state.targets.find(x=>x.id==state.docTargetId);
const co  = t ? t.company : “[CLIENT]”, loc = t ? t.location : “”;
const ind = t ? t.industry : “”, asts = t ? t.assets.join(”, “) : “”;
const wkrs = t ? t.workers : “”, dt = t ? t.date : “”;
const lo = t ? fmt(t.low) : “”, hi = t ? fmt(t.high) : “”, nt = t ? t.notes : “”;

const prompts = {
capability: `Write a professional one-page capability statement for ${who} at ${firm}, a stranded asset recovery consultant. Sections: What We Do, How It Works (3 steps: assess, market, close), Our Offer (free assessment, 12% success fee, zero upfront), Who We Serve (PE-backed companies, plant closures, bankruptcy estates), Why Work With Us. 350-400 words. Clear section headers.`,
agreement:  `Write a professional asset recovery broker agreement between ${firm} ("Broker") and ${co} ("Client")${loc?` in ${loc}`:""}.  Sections: Recitals, Scope (identify buyers for stranded assets), Compensation (12% success fee on gross recovered proceeds), Exclusivity (90 days), Payment Terms (net 30), Representations, Liability Limitations, Term & Termination, Governing Law (New Jersey), Signatures. Plain language. Numbered sections.`,
assessment: `Write a one-page asset recovery opportunity assessment for ${co}${loc?` in ${loc}`:""}. ${ind?`Industry: ${ind}.`:""} ${wkrs?`Workers affected: ${wkrs} as of ${dt}.`:""} ${asts?`Assets: ${asts}.`:""} ${nt?`Context: ${nt}`:""}  ${lo&&hi?`Estimated recovery: ${lo}-${hi}.`:""}\n\nSections: Executive Summary, Asset Overview, Recovery Scenarios (conservative/base/optimistic), Recommended Channels, Timeline, Next Steps. Professional, CFO-ready. 400-450 words.`,
intro:      `Write a short professional email from ${who} at ${firm} to the CFO or VP Operations at ${co}${loc?` in ${loc}`:""}. ${wkrs?`They had ${wkrs} workers affected as of ${dt}.`:""} ${asts?`Assets include: ${asts}.`:""} ${nt?`Notes: ${nt}`:""} Three short paragraphs. Focus on value. Low-pressure CTA: free assessment, no cost, no obligation. No bullets. Subject line first.`,
};

try {
state.docText = await callClaude(
“You are an expert business consultant and professional writer. Write clean professional documents. No markdown code fences in your output.”,
prompts[state.docType]
);
} catch(e) { state.docError = “Generation failed. Please try again.”; }
state.docLoading = false;
renderAll();
}

function copyDocText() {
const el = document.getElementById(“doc-output-text”);
if (!el) return;
const btn = document.getElementById(“doc-copy-btn”);
navigator.clipboard.writeText(el.innerText || el.textContent);
if (btn) { btn.textContent = “✓ COPIED”; setTimeout(()=>btn.textContent=“⎘ COPY ALL”,2000); }
}

function clearAllData() {

/* ════════════════════════════════════════════
UTILITY
════════════════════════════════════════════ */
function copyText(sourceId, btnId, copiedLabel, defaultLabel) {
const el  = document.getElementById(sourceId);
const btn = document.getElementById(btnId);
if (!el || !btn) return;
navigator.clipboard.writeText(el.innerText || el.textContent);
btn.textContent = copiedLabel;
setTimeout(()=>btn.textContent=defaultLabel, 2000);
}

// Auto-launch if already authed — runs after all functions are defined
if (sessionStorage.getItem(“rs-auth”) === “1”) {
launchApp();
}
