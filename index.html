<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1410;--s1:#1A2118;--s2:#1F2A1D;--s3:#253024;

body{background:var(--bg);color:var(--tx);font-family:var(--ff);min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#app{display:none}
#gate{display:flex;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(45,122,80,.08),transparent 70%)}
.gate-box{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:48px;width:100%;max-width:420px;text-align:center;animation:fadeUp .3s ease both}
.gate-err{font-size:10px;color:var(--red);margin-top:10px;letter-spacing:1px}
input.gi{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:14px;font-size:13px;font-family:var(--ff);border-radius:3px;outline:none;margin-bottom:12px;letter-spacing:1px;text-align:center;transition:border-color .2s;display:block}
input.gi:focus{border-color:var(--acc)}
input.gi::placeholder{color:#3A4A38}
button.gb{width:100%;background:#1E5C3A;color:#fff;border:none;font-family:var(--ff);font-size:11px;font-weight:700;letter-spacing:2px;padding:14px;border-radius:3px;cursor:pointer;transition:background .15s}
button.gb:hover{background:var(--acc)}
#nav{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;height:52px;position:sticky;top:0;z-index:100}
.ntab{background:none;border:none;cursor:pointer;padding:0 14px;height:52px;display:flex;align-items:center;font-size:9px;font-family:var(--ff);font-weight:700;letter-spacing:1.5px;color:var(--td);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc)}
#content{padding:28px 24px;max-width:1440px;margin:0 auto}
.pane{display:none}.pane.on{display:block;animation:fadeUp .25s ease both}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:16px}
.lbl{font-size:9px;color:var(--td);letter-spacing:2px;font-weight:700;margin-bottom:8px}
.lbl.ac{color:var(--acc)}
.ttl{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:11px;color:var(--td);margin-bottom:20px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--ff);font-size:10px;font-weight:700;letter-spacing:1.5px;padding:9px 16px;border-radius:3px;cursor:pointer;border:1px solid var(--acc);background:var(--adim);color:var(--acc);transition:all .15s}
.btn:disabled{background:var(--s3);border-color:var(--bd);color:var(--td);cursor:not-allowed}
.btn.sm{font-size:9px;padding:4px 10px}
.btn.full{width:100%;justify-content:center}
.btn.g{border-color:var(--grn);background:rgba(76,175,118,0.1);color:var(--grn)}
.btn.r{border-color:var(--red);background:rgba(239,68,68,0.1);color:var(--red)}
.btn.m{border-color:var(--td);background:transparent;color:var(--td)}
input.inp{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;font-size:11px;font-family:var(--ff);border-radius:3px;outline:none}
select{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;font-size:11px;font-family:var(--ff);border-radius:3px;outline:none;cursor:pointer}
select option{background:var(--s2)}
textarea{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;font-size:11px;font-family:var(--ff);border-radius:3px;outline:none;resize:vertical;line-height:1.7}
.badge{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1.5px;padding:2px 7px;border-radius:2px}
.badge.critical{color:#EF4444;background:#EF444418}
.badge.high{color:#F59E0B;background:#F59E0B18}
.badge.medium{color:#3B82F6;background:#3B82F618}
.badge.low{color:#6B7280;background:#6B728018}
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(45,122,80,.3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.trow{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:14px 16px;cursor:pointer;display:grid;grid-template-columns:2fr 1fr 1fr 100px 130px;gap:12px;align-items:center;transition:border-color .15s}
.trow:hover{border-color:var(--acc)}
.pbar{height:3px;background:var(--s2);border-radius:2px;margin-top:4px}
.pfill{height:3px;border-radius:2px}
.qa{background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:14px;cursor:pointer;transition:border-color .15s}
.qa:hover{border-color:var(--acc)}
.bkhd{display:grid;grid-template-columns:2fr 50px 1.2fr 1.2fr 80px 1fr;padding:7px 14px;border-bottom:1px solid var(--bd)}
.bkrow{display:grid;grid-template-columns:2fr 50px 1.2fr 1.2fr 80px 1fr;padding:10px 14px;border-bottom:1px solid var(--bd);align-items:center}
.warn{background:#F59E0B18;border:1px solid rgba(245,158,11,.4);border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#F59E0B}
.dtopt{padding:10px 12px;cursor:pointer;border-radius:3px;margin-bottom:4px;border:1px solid var(--bd);background:var(--s2);transition:all .1s}
.dtopt.on{background:var(--adim);border-color:var(--acc)}
.live{width:6px;height:6px;background:var(--grn);border-radius:50%;animation:pulse 2s infinite}
</style>
</head>

function fmt(n){return n>=1000000?'$'+(n/1000000).toFixed(1)+'M':n>=1000?'$'+Math.round(n/1000)+'K':'$'+n;}
function fee(n){return fmt(Math.round(n*0.12));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bdg(p){var m=PMETA[p]||PMETA.low;return '<span class="badge '+p+'">'+m.label+'</span>';}
function el(id){return document.getElementById(id);}
function html(id,h){el(id).innerHTML=h;}

function callClaude(system, user, opts) {
  opts = opts || {};
  var payload = {system:system, max_tokens:opts.max_tokens||2000, messages:[{role:'user',content:user}]};
  if (opts.tools) payload.tools = opts.tools;
  if (opts.model) payload.model = opts.model;
  return fetch('/.netlify/functions/claude-proxy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(d){
    if (!d.content) throw new Error(d.error||'Proxy error');
    return d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n');
  });
}

function saveTgts(){try{localStorage.setItem('rs-t4',JSON.stringify(S.targets));}catch(e){}}
function loadTgts(){try{var s=localStorage.getItem('rs-t4');S.targets=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_TARGETS));}catch(e){S.targets=JSON.parse(JSON.stringify(DEFAULT_TARGETS));}}

// GATE
document.getElementById('pwbtn').addEventListener('click', function() {
  var pw = el('pw').value;
  if (!pw) return;
  var btn = el('pwbtn');
  var err = el('pwerr');
  btn.textContent = 'CHECKING...';
  btn.disabled = true;
  err.style.display = 'none';
  fetch('/.netlify/functions/check-pw', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pw})
  }).then(function(r){return r.json();}).then(function(d){
    if (d.ok) {
      sessionStorage.setItem('rs-auth','1');
      el('gate').style.display = 'none';
      launchApp();
    } else {
      err.textContent = d.error || 'Incorrect password';
      err.style.display = 'block';
      el('pw').value = '';
      btn.textContent = 'ENTER THE PLATFORM';
      btn.disabled = false;
    }
  }).catch(function(e){
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
    btn.textContent = 'ENTER THE PLATFORM';
    btn.disabled = false;
  });
});

el('pw').addEventListener('keydown', function(e){if(e.key==='Enter') el('pwbtn').click();});

function launchApp() {
  el('gate').style.display = 'none';
  el('app').style.display = 'block';
  loadTgts();
  initNav();
  renderAll();
}

if (sessionStorage.getItem('rs-auth')==='1') {
  launchApp();
}

function initNav() {
  el('navtabs').innerHTML = TABS.map(function(t){
    return '<button class="ntab'+(t.id===S.tab?' on':'')+'" data-tab="'+t.id+'">'+t.label+'</button>';
  }).join('');
  el('navtabs').addEventListener('click', function(e){
    var b = e.target.closest('.ntab');
    if (b) switchTab(b.dataset.tab);
  });
}

function switchTab(id) {
  S.tab = id;
  document.querySelectorAll('.ntab').forEach(function(b){b.classList.toggle('on',b.dataset.tab===id);});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='p-'+id);});
  renderTab(id);
}

function updateStatus() {
  var pipe = S.targets.filter(function(t){return t.stage!=='Prospecting'&&t.stage!=='Closed';}).reduce(function(s,t){return s+t.high;},0);
  var pv = el('pipeval');
  pv.style.display = pipe>0?'':'none';
  pv.textContent = fmt(pipe)+' pipeline';
}

function renderAll() {
  updateStatus();
  TABS.forEach(function(t){renderTab(t.id);});
}

function renderTab(id) {
  var fns = {dashboard:renderDash,targets:renderTargets,outreach:renderOutreach,valuation:renderVal,buyers:renderBuyers,pipeline:renderPipeline,docs:renderDocs,settings:renderSettings};
  if (fns[id]) fns[id]();
}

function renderDash() {
  var t=S.targets;
  var lo=t.reduce(function(s,x){return s+x.low;},0);
  var hi=t.reduce(function(s,x){return s+x.high;},0);
  var crit=t.filter(function(x){return x.priority==='critical';}).length;
  var act=t.filter(function(x){return x.stage!=='Prospecting'&&x.stage!=='Closed';}).length;

function addFetchedTarget(i){

  var maxId=S.targets.reduce(function(m,x){return Math.max(m,x.id);},0);

function addAllFetched(){
  var maxId=S.targets.reduce(function(m,x){return Math.max(m,x.id);},0);

function aiFetchTargets(){
  var region=window.prompt('Region/criteria for new WARN Act targets:', S.fetchRegion||'New Jersey');
  if(!region)return;
  S.fetchRegion=region;S.fetching=true;S.fetchErr='';renderTargets();
  callClaude(
    'You are a research assistant for an industrial asset recovery brokerage. Use web search to find recent WARN Act filings and company shutdowns. Respond with valid JSON only, no prose, no markdown fences.',
    'Search the web for recent WARN Act filings, plant closures, and company shutdowns in '+region+' from the last 6 months. Find 5 companies with significant physical/industrial assets (manufacturing equipment, vehicles, machinery, IT, food processing, etc - NOT pure software/services). For each, return: company, location, industry, workers, date (Mon YYYY), assets (array of 4-6 asset categories), low and high (estimated USD recovery range), priority (critical|high|medium|low), notes (1-2 sentence broker insight). Return JSON only: {"targets":[{"company":"","location":"","industry":"","workers":0,"date":"","assets":[],"low":0,"high":0,"priority":"","notes":""}]}',
    {tools:[{type:'web_search_20250305',name:'web_search',max_uses:5}], max_tokens:4000}
  ).then(function(text){
    var clean=text.replace(/```json|```/g,'').trim();
    var first=clean.indexOf('{'),last=clean.lastIndexOf('}');
    if(first>=0&&last>first)clean=clean.substring(first,last+1);
    var parsed=JSON.parse(clean);
    S.fetchResults=(parsed.targets||[]).map(function(t){
      return {
        company:t.company||'',location:t.location||'',industry:t.industry||'',
        workers:parseInt(t.workers)||0,date:t.date||'',assets:t.assets||[],
        low:parseInt(t.low)||0,high:parseInt(t.high)||0,
        priority:t.priority||'medium',notes:t.notes||''
      };
    });
    S.fetching=false;renderTargets();
  }).catch(function(e){
    S.fetchErr='Fetch failed: '+e.message;
    S.fetching=false;renderTargets();
  });
}

var bkrows=(r.assets||[]).map(function(a){return '<div class="bkrow"><div><div style="font-size:12px;font-weight:600">'+esc(a.name)+'</div><div style="font-size:9px;color:var(--td);margin-top:2px">'+esc(a.notes||'')+'</div></div><div style="font-size:12px;color:var(--tm)">'+a.qty+'</div><div style="font-size:11px;color:var(--grn)">'+fmt(a.unitLow)+'-'+fmt(a.unitHigh)+'</div><div style="font-size:12px;color:var(--grn);font-weight:700">'+fmt(a.totalLow)+'-'+fmt(a.totalHigh)+'</div><div style="font-size:9px;font-weight:700;color:'+(a.confidence==='high'?'var(--grn)':a.confidence==='medium'?'var(--acc)':'var(--red)')+'">'+esc((a.confidence||'').toUpperCase())+'</div><div style="font-size:10px;color:var(--tm)">'+esc(a.channel||'')+'</div></div>';}).join('');
result='<div style="display:flex;flex-direction:column;gap:12px"><div class="g3"><div class="card"><div class="lbl">RECOVERY RANGE</div><div style="font-size:22px;color:var(--grn);font-weight:700">'+fmt(r.totalLow)+'</div><div style="font-size:13px;color:var(--tm)">to '+fmt(r.totalHigh)+'</div></div><div class="card"><div class="lbl">YOUR FEE @ 12%</div><div style="font-size:22px;color:var(--acc);font-weight:700">'+fmt(r.feeLow)+'</div><div style="font-size:13px;color:var(--tm)">to '+fmt(r.feeHigh)+'</div></div><div class="card"><div class="lbl">TIMELINE</div><div style="font-size:16px;font-weight:700;margin-top:4px">'+esc(r.timeline||'')+'</div><div style="font-size:10px;color:var(--td)">via '+esc(r.topChannel||'')+'</div></div></div><div class="card" style="border:1px solid rgba(45,122,80,.4)"><div class="lbl ac">STRATEGIC INSIGHT</div><div style="font-size:12px;color:var(--tm);line-height:1.8">'+esc(r.insight||'')+'</div></div><div class="card" style="padding:0"><div style="padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--s2)"><div class="lbl" style="margin-bottom:0">ASSET BREAKDOWN</div></div><div class="bkhd">'+['ASSET','QTY','UNIT VALUE','TOTAL','CONFIDENCE','CHANNEL'].map(function(h){return '<div style="font-size:8px;color:var(--td);letter-spacing:2px;font-weight:700">'+h+'</div>';}).join('')+'</div>'+bkrows+'</div></div>';
}
html('p-valuation','<div class="lbl ac">// AI ENGINE</div><div class="ttl">Asset Valuation Engine</div><div class="sub">Input any asset list - AI estimates per-asset recovery value, best channels, and timeline</div><div style="display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start"><div style="display:flex;flex-direction:column;gap:12px"><div class="card"><div class="lbl">LINK TO TARGET (OPTIONAL)</div><select id="val-tsel"><option value="">Ad-hoc assessment</option>'+tOpts+'</select></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="lbl" style="margin-bottom:0">ASSET INVENTORY</div><button class="btn sm g" id="val-add">+ ADD</button></div>'+items+'</div><button class="btn full" id="val-btn"'+(S.valLoading||S.valItems.every(function(a){return !a.desc&&!a.cat;})?' disabled':'')+'>'+( S.valLoading?'ANALYZING…':'GENERATE ESTIMATE')+'</button>'+(S.valErr?'<div style="color:var(--red);font-size:11px">'+esc(S.valErr)+'</div>':'')+'</div><div>'+result+'</div></div>');
el('val-tsel').addEventListener('change',function(){S.valTId=this.value;var t=S.targets.find(function(x){return x.id==S.valTId;});if(t)S.valItems=t.assets.map(function(a){return{cat:'Manufacturing Equipment',desc:a,qty:1,year:'',cond:'Good'};});else S.valItems=[{cat:'',desc:'',qty:1,year:'',cond:'Good'}];renderVal();});
if(el('val-add'))el('val-add').addEventListener('click',function(){S.valItems.push({cat:'',desc:'',qty:1,year:'',cond:'Good'});renderVal();});
if(el('val-btn'))el('val-btn').addEventListener('click',genVal);
el('p-valuation').addEventListener('click',function(e){var rm=e.target.closest('[data-rm]');if(rm){S.valItems.splice(parseInt(rm.dataset.rm),1);renderVal();}});
el('p-valuation').addEventListener('change',function(e){var vi=e.target.dataset.vi,vk=e.target.dataset.vk;if(vi!==undefined&&vk)S.valItems[vi][vk]=e.target.value;});
el('p-valuation').addEventListener('input',function(e){var vi=e.target.dataset.vi,vk=e.target.dataset.vk;if(vi!==undefined&&vk)S.valItems[vi][vk]=vk==='qty'?(parseInt(e.target.value)||1):e.target.value;});
}

function genVal() {
S.valLoading=true;S.valResult=null;S.valErr='';renderVal();
var t=S.targets.find(function(x){return x.id==S.valTId;});
var list=S.valItems.map(function(a,i){return (i+1)+'. ['+(a.cat||'Unknown')+'] '+(a.desc||'-')+' | Qty:'+a.qty+' | Year:'+(a.year||'N/A')+' | Condition:'+a.cond;}).join('\n');
callClaude(
'You are an expert industrial asset appraiser. Respond with valid JSON only.',
'Estimate fair market recovery values for these assets'+(t?' from '+t.company+' ('+t.location+', '+t.industry+')':'')+': '+list+'. Return JSON: {"assets":[{"name":"","qty":0,"unitLow":0,"unitHigh":0,"totalLow":0,"totalHigh":0,"confidence":"high|medium|low","channel":"","notes":""}],"totalLow":0,"totalHigh":0,"feeLow":0,"feeHigh":0,"timeline":"","topChannel":"","insight":""}'
).then(function(text){
S.valResult=JSON.parse(text.replace(/`json|`/g,'').trim());
S.valLoading=false;renderVal();
}).catch(function(e){
S.valErr='Valuation failed: '+e.message;
S.valLoading=false;renderVal();
});
}

function renderBuyers() {
var cats=[];BUYERS.forEach(function(b){if(cats.indexOf(b.cat)<0)cats.push(b.cat);});
html('p-buyers','<div class="lbl ac">// BUYER NETWORK</div><div class="ttl">Buyer Database</div><div class="sub">Pre-vetted buyer channels by asset type - most will bid within 48 hours</div>'+cats.map(function(cat){return '<div style="margin-bottom:24px"><div style="font-size:9px;color:var(--acc);letter-spacing:2.5px;font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--bd);padding-bottom:6px">// '+cat.toUpperCase()+'</div><div class="g3">'+BUYERS.filter(function(b){return b.cat===cat;}).map(function(b){return '<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:700">'+esc(b.name)+'</div><span style="font-size:9px;color:var(--grn);font-weight:700">'+b.min+'</span></div><div style="font-size:11px;color:var(--tm);margin-bottom:6px">'+esc(b.note)+'</div><div style="font-size:10px;color:var(--td)">'+b.url+'</div></div>';}).join('')+'</div></div>';}).join(''));
}

function renderPipeline() {
var pipe=S.targets.filter(function(t){return t.stage!=='Prospecting'&&t.stage!=='Closed';}).reduce(function(s,t){return s+t.high;},0);
var closed=S.targets.filter(function(t){return t.stage==='Closed';}).reduce(function(s,t){return s+t.high;},0);
var cols=STAGES.map(function(stage){
var st=S.targets.filter(function(t){return t.stage===stage;});
var sv=st.reduce(function(s,t){return s+t.high;},0);
var idx=STAGES.indexOf(stage);
var cards=st.map(function(t){return '<div style="background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:10px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;margin-bottom:2px">'+esc(t.company)+'</div><div style="font-size:9px;color:var(--td);margin-bottom:6px">'+esc(t.location)+'</div><div style="font-size:12px;color:var(--grn);font-weight:700">'+fmt(t.low)+'-'+fmt(t.high)+'</div><div style="font-size:9px;color:var(--acc);margin-bottom:8px">fee: '+fee(t.high)+'</div>'+bdg(t.priority)+'<div style="display:flex;gap:4px;margin-top:8px">'+(idx>0?'<button style="flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--td);font-size:8px;padding:4px 2px;cursor:pointer;font-family:var(--ff);border-radius:2px" data-mv="'+t.id+'" data-dir="-1">BACK</button>':'')+(idx<STAGES.length-1?'<button style="flex:1;background:var(--adim);border:1px solid var(--acc);color:var(--acc);font-size:8px;padding:4px 2px;cursor:pointer;font-family:var(--ff);border-radius:2px" data-mv="'+t.id+'" data-dir="1">NEXT</button>':'')+'</div></div>';}).join('');
return '<div><div style="margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+SCLR[stage]+'"><div style="font-size:9px;font-weight:700;color:'+SCLR[stage]+';letter-spacing:1.5px">'+stage.toUpperCase()+'</div><div style="font-size:10px;color:var(--td)">'+st.length+' deal'+(st.length!==1?'s':'')+(sv>0?' <span style="color:var(--grn)">'+fmt(sv)+'</span>':'')+'</div></div>'+cards+'</div>';
}).join('');
html('p-pipeline','<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px"><div><div class="lbl ac">// DEAL FLOW</div><div class="ttl">Pipeline Tracker</div><div class="sub" style="margin-bottom:0">Click NEXT to advance deals through stages</div></div><div style="display:flex;gap:16px"><div style="text-align:right"><div style="font-size:9px;color:var(--td);letter-spacing:2px">ACTIVE PIPELINE</div><div style="font-size:18px;color:var(--acc);font-weight:700">'+fmt(pipe)+'</div></div><div style="text-align:right"><div style="font-size:9px;color:var(--td);letter-spacing:2px">CLOSED</div><div style="font-size:18px;color:var(--grn);font-weight:700">'+fmt(closed)+'</div></div></div></div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">'+cols+'</div>');
el('p-pipeline').addEventListener('click',function(e){var b=e.target.closest('[data-mv]');if(!b)return;var t=S.targets.find(function(x){return x.id===parseInt(b.dataset.mv);});if(!t)return;var i=STAGES.indexOf(t.stage);t.stage=STAGES[Math.min(Math.max(i+parseInt(b.dataset.dir),0),STAGES.length-1)];saveTgts();updateStatus();renderPipeline();});
}

function renderDocs() {
var tOpts=S.targets.map(function(t){return '<option value="'+t.id+'"'+(t.id==S.docTId?' selected':'')+'>'+esc(t.company)+'</option>';}).join('');
var needsT=['agreement','assessment','intro'].indexOf(S.docType)>-1;
var dtbtns=DOC_TYPES.map(function(d){return '<div class="dtopt'+(d.id===S.docType?' on':'')+'" data-dt="'+d.id+'"><div style="font-size:11px;font-weight:700;color:'+(d.id===S.docType?'var(--acc)':'var(--tx)')+'">'+d.label+'</div><div style="font-size:10px;color:var(--td)">'+d.desc+'</div></div>';}).join('');
var output=S.docText?'<div style="position:relative;padding:16px;background:var(--s1);border:1px solid var(--bd);border-radius:4px;min-height:400px"><div style="position:absolute;top:12px;right:12px"><button class="btn sm m" id="doc-copy">COPY ALL</button></div><div style="font-size:12px;color:var(--tm);line-height:2;white-space:pre-wrap;padding-right:80px;font-family:var(--ff)" id="doc-out">'+esc(S.docText)+'</div></div>':'<div class="card" style="display:flex;align-items:center;justify-content:center;min-height:400px;flex-direction:column;gap:12px"><div style="font-size:11px;color:var(--td)">Select a document type and click Generate</div></div>';
html('p-docs','<div class="lbl ac">// AI ENGINE</div><div class="ttl">Document Generator</div><div class="sub">Professional documents on demand - capability statements - agreements - assessments</div><div style="display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start"><div style="display:flex;flex-direction:column;gap:12px"><div class="card"><div class="lbl">DOCUMENT TYPE</div>'+dtbtns+'</div><div class="card"><div class="lbl">YOUR DETAILS</div><div style="display:flex;flex-direction:column;gap:8px"><input class="inp" type="text" id="doc-name" value="'+esc(S.docName)+'" placeholder="Your name..." /><input class="inp" type="text" id="doc-co" value="'+esc(S.docCo)+'" placeholder="Your company..." />'+(needsT?'<div class="lbl" style="margin-top:4px;margin-bottom:4px">TARGET COMPANY</div><select id="doc-tsel"><option value="">Select target…</option>'+tOpts+'</select>':'')+'</div></div><button class="btn full" id="doc-btn"'+(S.docLoading?' disabled':'')+'>'+( S.docLoading?'GENERATING…':'GENERATE DOCUMENT')+'</button>'+(S.docErr?'<div style="color:var(--red);font-size:11px">'+esc(S.docErr)+'</div>':'')+'</div>'+output+'</div>');
el('p-docs').addEventListener('click',function(e){var dt=e.target.closest('[data-dt]');if(dt){S.docType=dt.dataset.dt;S.docText='';renderDocs();return;}});
el('doc-name').addEventListener('input',function(){S.docName=this.value;});
el('doc-co').addEventListener('input',function(){S.docCo=this.value;});
if(el('doc-tsel'))el('doc-tsel').addEventListener('change',function(){S.docTId=this.value;});
if(el('doc-btn'))el('doc-btn').addEventListener('click',genDoc);
if(el('doc-copy'))el('doc-copy').addEventListener('click',function(){var e=el('doc-out');navigator.clipboard.writeText(e.innerText||e.textContent);this.textContent='COPIED';var self=this;setTimeout(function(){self.textContent='COPY ALL';},2000);});
}

function genDoc() {
S.docLoading=true;S.docText='';S.docErr='';renderDocs();
var who=S.docName||'the consultant',firm=S.docCo||'Reclaim Solutions';
var t=S.targets.find(function(x){return x.id==S.docTId;});
var co=t?t.company:'[CLIENT]',loc=t?t.location:'';
var ind=t?t.industry:'',asts=t?t.assets.join(', '):'';
var wkrs=t?t.workers:'',dt=t?t.date:'';
var lo=t?fmt(t.low):'',hi=t?fmt(t.high):'',nt=t?t.notes:'';
var prompts={
capability:'Write a professional one-page capability statement for '+who+' at '+firm+', a stranded asset recovery consultant. Sections: What We Do, How It Works (assess, market, close), Our Offer (free assessment, 12% success fee, zero upfront), Who We Serve, Why Work With Us. 350-400 words.',
agreement:'Write a professional asset recovery broker agreement between '+firm+' (Broker) and '+co+' (Client)'+(loc?' in '+loc:'')+'. Sections: Recitals, Scope, Compensation (12% success fee), Exclusivity (90 days), Payment (net 30), Representations, Liability Limitations, Term and Termination, Governing Law (New Jersey), Signatures.',
assessment:'Write a one-page asset recovery opportunity assessment for '+co+(loc?' in '+loc:'')+'.'+(ind?' Industry: '+ind+'.':'')+(wkrs?' Workers: '+wkrs+' as of '+dt+'.':'')+(asts?' Assets: '+asts+'.':'')+(nt?' Context: '+nt:'')+(lo&&hi?' Estimated recovery: '+lo+'-'+hi+'.':'')+' Sections: Executive Summary, Asset Overview, Recovery Scenarios, Recommended Channels, Timeline, Next Steps. Professional, CFO-ready.',
intro:'Write a short professional email from '+who+' at '+firm+' to the CFO at '+co+(loc?' in '+loc:'')+'.'+(wkrs?' They had '+wkrs+' workers affected as of '+dt+'.':'')+(asts?' Assets include: '+asts+'.':'')+(nt?' Notes: '+nt:'')+' Three short paragraphs. Low-pressure CTA: free assessment, no cost. Subject line first.'
};
callClaude('You are an expert business consultant and professional writer. Write clean professional documents. No markdown code fences.',prompts[S.docType]).then(function(text){
S.docText=text;S.docLoading=false;renderDocs();
}).catch(function(e){
S.docErr='Generation failed: '+e.message;S.docLoading=false;renderDocs();
});
}

function renderSettings() {
html('p-settings','<div class="lbl ac">// SETTINGS</div><div class="ttl">Platform Settings</div><div style="display:flex;flex-direction:column;gap:16px;max-width:560px;margin-top:20px"><div class="card"><div class="lbl ac" style="margin-bottom:12px">// AI ENGINE</div><div style="font-size:11px;color:var(--td);line-height:1.7">All AI features run through a secure server-side proxy. The Anthropic API key is stored as the <span style="color:var(--acc)">ANTHROPIC_KEY</span> Netlify environment variable and never exposed to the browser.</div><div style="margin-top:10px;font-size:10px;color:var(--grn)">Secure - key lives on the server only</div></div><div class="card"><div class="lbl ac" style="margin-bottom:12px">// ACCESS PASSWORD</div><div style="font-size:11px;color:var(--td);line-height:1.7">Password is set via the <span style="color:var(--acc)">WEBSITE_PW</span> Netlify environment variable.</div></div><div class="card"><div class="lbl ac" style="margin-bottom:12px">// DATA MANAGEMENT</div><div style="font-size:11px;color:var(--td);margin-bottom:12px">Target data and pipeline stages are saved in browser localStorage.</div><button class="btn r" id="clear-btn">CLEAR ALL DATA</button></div></div>');
el('clear-btn').addEventListener('click',function(){if(window.confirm('Clear all data? Cannot be undone.')){localStorage.removeItem('rs-t4');loadTgts();renderAll();}});
}
