<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body style="background:#0F1410;color:#E8EDE4;font-family:monospace;padding:40px">
<input type="password" id="pw" placeholder="Enter password" style="padding:10px;font-size:16px;background:#1A2118;border:1px solid #2A3828;color:#E8EDE4;border-radius:4px" />
<button onclick="check()" style="padding:10px 20px;background:#1E5C3A;color:#fff;border:none;cursor:pointer;font-size:16px;margin-left:10px">Enter</button>
<div id="msg" style="margin-top:20px;font-size:14px"></div>

<script>
async function check() {
  const pw = document.getElementById('pw').value;
  document.getElementById('msg').textContent = 'Calling function...';
  try {
    const r = await fetch('/.netlify/functions/check-pw', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pw})
    });
    const d = await r.json();
    document.getElementById('msg').textContent = JSON.stringify(d);
  } catch(e) {
    document.getElementById('msg').textContent = 'ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
