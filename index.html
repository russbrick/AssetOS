<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSET OS — Reclaim Solutions</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=IBM+Plex+Mono:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1410;--s1:#1A2118;--s2:#1F2A1D;--s3:#253024;
  --bd:#2A3828;--acc:#2D7A50;--acl:#4A9B6E;--adim:rgba(45,122,80,0.1);
  --tx:#E8EDE4;--tm:#B8C8B0;--td:#6A7A68;
  --grn:#4CAF76;--red:#EF4444;--yel:#F59E0B;
  --ff:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--tx);font-family:var(--ff);min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#app{display:none}
#gate{display:flex;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(45,122,80,.08),transparent 70%)}
.gate-box{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:48px;width:100%;max-width:420px;text-align:center;animation:fadeUp .3s ease both}
.gate-err{font-size:10px;color:var(--red);margin-top:10px;letter-spacing:1px}
input.gi{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:14px;font-size:13px;font-family:var(--ff);border-radius:3px;outline:none;margin-bottom:12px;letter-spacing:1px;text-align:center;transition:border-color .2s;display:block}
input.gi:focus{border-color:var(--acc)}
input.gi::placeholder{color:#3A4A38}
button.gb{width:100%;background:#1E5C3A;color:#fff;border:none;font-family:var(--ff);font-size:11px;font-weight:700;letter-spacing:2px;padding:14px;border-radius:3px;cursor:pointer;transition:background .15s}
button.gb:hover{background:var(--acc)}
#nav{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;height:52px;position:sticky;top:0;z-index:100}
.ntab{background:none;border:none;cursor:pointer;padding:0 14px;height:52px;display:flex;align-items:center;font-size:9px;font-family:var(--ff);font-weight:700;letter-spacing:1.5px;color:var(--td);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc)}
#content{padding:28px 24px;max-width:1440px;margin:0 auto}
.pane{display:none}.pane.on{display:block;animation:fadeUp .25s ease both}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:16px}
.lbl{font-size:9px;color:var(--td);letter-spacing:2px;font-weight:700;margin-bottom:8px}
.lbl.ac{color:var(--acc)}
.ttl{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:11px;color:var(--td);margin-bottom:20px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--ff);font-size:10px;font-weight:700;letter-spacing:1.5px;padding:9px 16px;border-radius:3px;cursor:pointer;border:1px solid var(--acc);background:var(--adim);color:var(--acc);transition:all .15s}
.btn:disabled{background:var(--s3);border-color:var(--bd);color:var(--td);cursor:not-allowed}
.btn.sm{font-size:9px;padding:4px 10px}
.btn.full{width:100%;justify-content:center}
.btn.g{border-color:var(--grn);background:rgba(76,175,118,0.1);color:var(--grn)}
.btn.r{border-color:var(--red);background:rgba(239,68,68,0.1);color:var(--red)}
.btn.m{border-color:var(--td);background:transparent;color:var(--td)}
input.inp,select{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;font-size:11px;font-family:var(--ff);border-radius:3px;outline:none}
select{cursor:pointer}
select option{background:var(--s2)}
textarea{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;font-size:11px;font-family:var(--ff);border-radius:3px;outline:none;resize:vertical;line-height:1.7}
.badge{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1.5px;padding:2px 7px;border-radius:2px}
.badge.critical{color:#EF4444;background:#EF444418}
.badge.high{color:#F59E0B;background:#F59E0B18}
.badge.medium{color:#3B82F6;background:#3B82F618}
.badge.low{color:#6B7280;background:#6B728018}
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(45,122,80,.3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.trow{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:14px 16px;cursor:pointer;display:grid;grid-template-columns:2fr 1fr 1fr 100px 130px;gap:12px;align-items:center;transition:border-color .15s}
.trow:hover{border-color:var(--acc)}
.pbar{height:3px;background:var(--s2);border-radius:2px;margin-top:4px}
.pfill{height:3px;border-radius:2px}
.qa{background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:14px;cursor:pointer;transition:border-color .15s}
.qa:hover{border-color:var(--acc)}
.bkhd{display:grid;grid-template-columns:2fr 50px 1.2fr 1.2fr 80px 1fr;padding:7px 14px;border-bottom:1px solid var(--bd)}
.bkrow{display:grid;grid-template-columns:2fr 50px 1.2fr 1.2fr 80px 1fr;padding:10px 14px;border-bottom:1px solid var(--bd);align-items:center}
.warn{background:#F59E0B18;border:1px solid rgba(245,158,11,.4);border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#F59E0B}
.dtopt{padding:10px 12px;cursor:pointer;border-radius:3px;margin-bottom:4px;border:1px solid var(--bd);background:var(--s2);transition:all .1s}
.dtopt.on{background:var(--adim);border-color:var(--acc)}
.live{width:6px;height:6px;background:var(--grn);border-radius:50%;animation:pulse 2s infinite}
</style>
</head>
<body>

<script>
  alert('script started');
(function() {
'use strict';

/* ── DATA ── */
const STAGES = ['Prospecting','Assessment','Agreement','Marketing','Negotiation','Closed'];
const SCLR = {Prospecting:'#505050',Assessment:'#3B82F6',Agreement:'#F59E0B',Marketing:'#8B5CF6',Negotiation:'#F97316',Closed:'#4CAF76'};
const PMETA = {

  medium:  {label:'MEDIUM',  fg:'#3B82F6',bg:'#3B82F618'},
  low:     {label:'LOW',     fg:'#6B7280',bg:'#6B728018'},
};
const TABS = [
  {id:'dashboard',label:'DASHBOARD'},
  {id:'targets',  label:'TARGETS'},
  {id:'outreach', label:'OUTREACH'},
  {id:'valuation',label:'VALUATION'},
  {id:'buyers',   label:'BUYERS'},
  {id:'pipeline', label:'PIPELINE'},
  {id:'docs',     label:'DOCUMENTS'},
  {id:'settings', label:'SETTINGS'},
];
const DEFAULT_TARGETS = [
  {id:1,company:'KRP Transport',location:'Burlington, NJ',industry:'Transportation / Logistics',workers:298,date:'Sep 2025',assets:['Semi Trucks (50+)','Trailers','Forklifts','Dock Equipment','GPS/Telematics Systems','Fuel Tanks'],low:2000000,high:5000000,priority:'critical',stage:'Prospecting',contact:'',notes:'Full transport shutdown. Fleet liquidation — 50 trucks avg $60K = $3M. Move immediately.'},
  {id:2,company:'TransAxle',location:'Cinnaminson, NJ',industry:'Auto Parts Manufacturing',workers:200,date:'Aug-Sep 2025',assets:['Assembly Equipment','Hydraulic Presses','Conveyor Systems','Parts Inventory','Warehouse Racking','Tooling & Dies'],low:300000,high:800000,priority:'critical',stage:'Prospecting',contact:'Marty Halle (CFO)',notes:'Complete manufacturing shutdown. Auto parts equipment sells well in Mexico and Eastern Europe.'},
  {id:3,company:'Barrette Outdoor Living',location:'Egg Harbor City, NJ',industry:'Outdoor Products Mfg',workers:120,date:'Jul 2025',assets:['Extrusion Equipment','Molds & Dies','Vinyl Processing Machinery','Raw Material Inventory','Warehouse Racking'],low:200000,high:600000,priority:'high',stage:'Prospecting',contact:'',notes:'Molds and dies worth $50-200K. Strong international demand for extrusion equipment.'},
  {id:4,company:'Seviroli Foods',location:'Bellmawr, NJ',industry:'Food Manufacturing',workers:77,date:'Aug 2025',assets:['Food Processing Equipment','Packaging Lines','Stainless Steel Tanks','Refrigeration Units','Conveyor Systems'],low:150000,high:400000,priority:'high',stage:'Prospecting',contact:'Paul Vertullo (CEO)',notes:'SS food processing in strong international demand — Latin America, SE Asia especially.'},
  {id:5,company:'Alstom Transportation',location:'Camden, NJ',industry:'Rail & Transit Equipment',workers:117,date:'Feb 2025',assets:['Rail Maintenance Equipment','Diagnostic Tools','Vehicle Components','Workshop Machinery','Specialized Tooling'],low:200000,high:500000,priority:'high',stage:'Prospecting',contact:'',notes:'Specialized buyer pool — transit authorities and rail contractors.'},
  {id:6,company:'Pioneer Credit Recovery',location:'Burlington, NJ',industry:'Financial Services',workers:180,date:'Mar 2026',assets:['Servers & Networking','Workstations (180)','Call Center Equipment','Office Furniture','Filing Systems'],low:50000,high:150000,priority:'medium',stage:'Prospecting',contact:'',notes:'Filed Dec 2025 — window open NOW. 180 workstations + server infrastructure.'},
  {id:7,company:'Jefferson Health',location:'Cherry Hill, NJ',industry:'Healthcare',workers:108,date:'Jan 2026',assets:['Medical Equipment','Diagnostic Tools','IT Infrastructure','Exam Furniture','Lab Equipment'],low:75000,high:200000,priority:'medium',stage:'Prospecting',contact:'',notes:'Package with HIPAA data destruction as bundled service.'},
  {id:8,company:'Ready Pac Produce',location:'Florence, NJ',industry:'Food Processing',workers:75,date:'Apr 2025',assets:['Cold Storage Units','Packaging Equipment','Processing Lines','Refrigerated Fleet','Warehouse Racking'],low:100000,high:300000,priority:'medium',stage:'Prospecting',contact:'',notes:'Cold chain equipment in high domestic demand. Refrigerated fleet sells in days.'},
  {id:9,company:'Iron Hill Brewery',location:'Maple Shade, NJ',industry:'Food & Beverage',workers:108,date:'Sep-Oct 2025',assets:['Fermentation Tanks','Kegging Lines','Refrigeration Systems','Draft Systems','Restaurant Equipment'],low:80000,high:220000,priority:'medium',stage:'Prospecting',contact:'',notes:'Active craft brewery secondary market. Fermentation tanks sell in days.'},
  {id:10,company:'TTEC Government Solutions',location:'Egg Harbor, NJ',industry:'Government / Call Center',workers:120,date:'Jan 2026',assets:['Workstations (120)','Servers','Networking Equipment','Headsets & AV','Office Furniture'],low:40000,high:120000,priority:'medium',stage:'Prospecting',contact:'',notes:'120-seat call center. ITAD brokers will buy the lot outright within a week.'},
];
const BUYERS = [
  {name:'IronPlanet',cat:'Industrial Equipment',url:'ironplanet.com',min:'$50K+',note:'Global marketplace for heavy equipment.'},
  {name:'Ritchie Bros.',cat:'Industrial Equipment',url:'rbauction.com',min:'$100K+',note:'World\'s largest industrial auctioneer.'},
  {name:'Machinio',cat:'Manufacturing Machinery',url:'machinio.com',min:'$10K+',note:'Search engine for used machinery. Huge international buyer base.'},
  {name:'CommercialTruckTrader',cat:'Commercial Vehicles',url:'commercialtrucktrader.com',min:'$20K+',note:'Largest US marketplace for commercial trucks.'},
  {name:'TruckPaper',cat:'Commercial Vehicles',url:'truckpaper.com',min:'$15K+',note:'Heavy truck classifieds. Strong broker network.'},
  {name:'Aucto',cat:'Food Processing Equipment',url:'aucto.com',min:'$25K+',note:'Industrial and food equipment auctions. 40+ countries.'},
  {name:'ProBrewery Equipment',cat:'Brewery Equipment',url:'probrewery.com',min:'$5K+',note:'Used brewing equipment marketplace.'},
  {name:'Radwell International',cat:'Industrial Electronics',url:'radwell.com',min:'$10K+',note:'PLCs, drives, electronics. Will buy outright.'},
  {name:'Surplus City Liquidators',cat:'Office / IT Equipment',url:'surpluscity.com',min:'$5K+',note:'Office furniture, electronics, IT liquidation.'},
  {name:'BioMedical Equipment Trader',cat:'Medical Equipment',url:'biomed.com',min:'$10K+',note:'Hospital equipment remarketing network.'},
  {name:'Santek Industries',cat:'Rail / Specialty Equipment',url:'santekindustries.com',min:'$50K+',note:'Specialized industrial and rail equipment buyers.'},
  {name:'Excess Logic',cat:'Office / IT Equipment',url:'excesslogic.com',min:'$10K+',note:'ITAD and IT asset liquidation. Takes entire lots.'},
];
const ASSET_CATS = ['Manufacturing Equipment','Commercial Vehicles','Food Processing Equipment','IT Hardware','Office Furniture','Medical Equipment','Brewery Equipment','Warehouse Equipment','Raw Materials / Inventory','Rail & Specialty Equipment','Other'];
const CONDITIONS = ['Excellent','Good','Fair','Poor'];
const DOC_TYPES = [
  {id:'capability',label:'CAPABILITY STATEMENT',desc:'One-pager for cold outreach'},
  {id:'agreement', label:'FEE AGREEMENT',       desc:'12% success fee contract'},
  {id:'assessment',label:'RECOVERY ASSESSMENT', desc:'CFO-ready asset report'},
  {id:'intro',     label:'INTRO EMAIL',         desc:'First-touch personalized email'},
];

/* ── STATE ── */
var S = {
  tab:'dashboard', targets:[], detailId:null, filterP:'all',
  oeId:'', oeEmails:[], oeLoading:false, oeErr:'',
  valItems:[{cat:'',desc:'',qty:1,year:'',cond:'Good'}], valTId:'', valResult:null, valLoading:false, valErr:'',
  docType:'capability', docTId:'', docName:'Russ Brick', docCo:'Reclaim Solutions', docText:'', docLoading:false, docErr:'',
};

/* ── HELPERS ── */
function fmt(n){return n>=1000000?'$'+(n/1000000).toFixed(1)+'M':n>=1000?'$'+Math.round(n/1000)+'K':'$'+n;}
function fee(n){return fmt(Math.round(n*0.12));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bdg(p){var m=PMETA[p]||PMETA.low;return '<span class="badge '+p+'">'+m.label+'</span>';}
function get(id){return document.getElementById(id);}
function html(id,h){get(id).innerHTML=h;}

async function callClaude(system, user) {
  var res = await fetch('/.netlify/functions/claude-proxy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:system, max_tokens:2000, messages:[{role:'user',content:user}]})
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Proxy error');
  return data.content[0].text;
}

function saveTgts(){try{localStorage.setItem('rs-t4',JSON.stringify(S.targets));}catch(e){}}
function loadTgts(){try{var s=localStorage.getItem('rs-t4');S.targets=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_TARGETS));}catch(e){S.targets=JSON.parse(JSON.stringify(DEFAULT_TARGETS));}}

/* ── GATE ── */
function setupGate() {
  var btn = get('pwbtn');
  var inp = get('pw');
  var err = get('pwerr');

  async function doCheck() {
    var val = inp.value;
    if (!val) return;
    btn.textContent = 'CHECKING...';
    btn.disabled = true;
    err.style.display = 'none';
    try {
      var res = await fetch('/.netlify/functions/check-pw', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:val})
      });
      var d = await res.json();
      if (d.ok) {
        sessionStorage.setItem('rs-auth','1');
        get('gate').style.display = 'none';
        launchApp();
      } else {
        err.textContent = d.error || 'Incorrect password';
        err.style.display = 'block';
        inp.value = '';
        btn.textContent = 'ENTER THE PLATFORM';
        btn.disabled = false;
      }
    } catch(e) {
      err.textContent = 'Error: ' + e.message;
      err.style.display = 'block';
      btn.textContent = 'ENTER THE PLATFORM';
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', doCheck);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') doCheck(); });
}

/* ── LAUNCH ── */
function launchApp() {
  get('gate').style.display = 'none';
  get('app').style.display = 'block';
  loadTgts();
  initNav();
  renderAll();
}

/* ── NAV ── */
function initNav() {
  get('navtabs').innerHTML = TABS.map(function(t) {
    return '<button class="ntab'+(t.id===S.tab?' on':'')+'" data-tab="'+t.id+'">'+t.label+'</button>';
  }).join('');
  get('navtabs').addEventListener('click', function(e) {
    var btn = e.target.closest('.ntab');
    if (!btn) return;
    switchTab(btn.dataset.tab);
  });
}

function switchTab(id) {
  S.tab = id;
  document.querySelectorAll('.ntab').forEach(function(b){b.classList.toggle('on',b.dataset.tab===id);});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='p-'+id);});
  renderTab(id);
}

function updateStatus() {
  var pipe = S.targets.filter(function(t){return t.stage!=='Prospecting'&&t.stage!=='Closed';}).reduce(function(s,t){return s+t.high;},0);
  var pv = get('pipeval');
  pv.style.display = pipe>0?'':'none';
  pv.textContent = fmt(pipe)+' pipeline';
}

/* ── RENDER ── */
function renderAll() {
  updateStatus();
  TABS.forEach(function(t){ renderTab(t.id); });
}

function renderTab(id) {
  var fns = {dashboard:renderDash,targets:renderTargets,outreach:renderOutreach,valuation:renderVal,buyers:renderBuyers,pipeline:renderPipeline,docs:renderDocs,settings:renderSettings};
  if (fns[id]) fns[id]();
}

/* ── DASHBOARD ── */
function renderDash() {
  var t = S.targets;
  var lo = t.reduce(function(s,x){return s+x.low;},0);
  var hi = t.reduce(function(s,x){return s+x.high;},0);
  var crit = t.filter(function(x){return x.priority==='critical';}).length;
  var act = t.filter(function(x){return x.stage!=='Prospecting'&&x.stage!=='Closed';}).length;
  var clv = t.filter(function(x){return x.stage==='Closed';}).reduce(function(s,x){return s+x.high;},0);

  function sc(label,val,sub,color) {
    return '<div class="card" style="text-align:center"><div class="lbl">'+label+'</div><div style="font-size:28px;font-weight:700;color:'+color+';margin-bottom:4px">'+val+'</div>'+(sub?'<div style="font-size:10px;color:var(--td)">'+sub+'</div>':'')+'</div>';
  }

  var topT = t.filter(function(x){return x.priority==='critical'||x.priority==='high';}).slice(0,5).map(function(x){

var idx=STAGES.indexOf(stage);
var cards=st.map(function(t){
return ‘<div style="background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:10px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;margin-bottom:2px">’+esc(t.company)+’</div><div style="font-size:9px;color:var(--td);margin-bottom:6px">’+esc(t.location)+’</div><div style="font-size:12px;color:var(--grn);font-weight:700">’+fmt(t.low)+’-’+fmt(t.high)+’</div><div style="font-size:9px;color:var(--acc);margin-bottom:8px">fee: ‘+fee(t.high)+’</div>’+bdg(t.priority)+’<div style="display:flex;gap:4px;margin-top:8px">’+(idx>0?’<button style="flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--td);font-size:8px;padding:4px 2px;cursor:pointer;font-family:var(--ff);border-radius:2px" data-mv="'+t.id+'" data-dir="-1">BACK</button>’:’’)+(idx<STAGES.length-1?’<button style="flex:1;background:var(--adim);border:1px solid var(--acc);color:var(--acc);font-size:8px;padding:4px 2px;cursor:pointer;font-family:var(--ff);border-radius:2px" data-mv="'+t.id+'" data-dir="1">NEXT</button>’:’’)+’</div></div>’;
}).join(’’);
return ‘<div><div style="margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+SCLR[stage]+'"><div style="font-size:9px;font-weight:700;color:'+SCLR[stage]+';letter-spacing:1.5px">’+stage.toUpperCase()+’</div><div style="font-size:10px;color:var(--td)">’+st.length+’ deal’+(st.length!==1?‘s’:’’)+(sv>0?’ <span style="color:var(--grn)">’+fmt(sv)+’</span>’:’’)+’</div></div>’+cards+’</div>’;
}).join(’’);
html(‘p-pipeline’,’<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px"><div><div class="lbl ac">// DEAL FLOW</div><div class="ttl">Pipeline Tracker</div><div class="sub" style="margin-bottom:0">Click NEXT to advance deals through stages</div></div><div style="display:flex;gap:16px"><div style="text-align:right"><div style="font-size:9px;color:var(--td);letter-spacing:2px">ACTIVE PIPELINE</div><div style="font-size:18px;color:var(--acc);font-weight:700">’+fmt(pipe)+’</div></div><div style="text-align:right"><div style="font-size:9px;color:var(--td);letter-spacing:2px">CLOSED</div><div style="font-size:18px;color:var(--grn);font-weight:700">’+fmt(closed)+’</div></div></div></div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">’+cols+’</div>’);
get(‘p-pipeline’).addEventListener(‘click’,function(e){
var btn=e.target.closest(’[data-mv]’);
if(!btn)return;
var id=parseInt(btn.dataset.mv),dir=parseInt(btn.dataset.dir);
var t=S.targets.find(function(x){return x.id===id;});
if(!t)return;
var i=STAGES.indexOf(t.stage);
t.stage=STAGES[Math.min(Math.max(i+dir,0),STAGES.length-1)];
saveTgts();updateStatus();renderPipeline();
});
}

/* ── DOCUMENTS ── */
function renderDocs() {
var tOpts=S.targets.map(function(t){return ‘<option value=”’+t.id+’”’+(t.id==S.docTId?’ selected’:’’)+’>’+esc(t.company)+’</option>’;}).join(’’);
var needsT=[‘agreement’,‘assessment’,‘intro’].indexOf(S.docType)>-1;
var dtbtns=DOC_TYPES.map(function(d){return ‘<div class="dtopt'+(d.id===S.docType?' on':'')+'" data-dt="'+d.id+'"><div style="font-size:11px;font-weight:700;color:'+(d.id===S.docType?'var(--acc)':'var(--tx)')+'">’+d.label+’</div><div style="font-size:10px;color:var(--td)">’+d.desc+’</div></div>’;}).join(’’);
var output=S.docText?’<div style="position:relative;padding:16px;background:var(--s1);border:1px solid var(--bd);border-radius:4px;min-height:400px"><div style="position:absolute;top:12px;right:12px"><button class="btn sm m" id="doc-copy">COPY ALL</button></div><div style="font-size:12px;color:var(--tm);line-height:2;white-space:pre-wrap;padding-right:80px;font-family:var(--ff)" id="doc-out">’+esc(S.docText)+’</div></div>’:’<div class="card" style="display:flex;align-items:center;justify-content:center;min-height:400px;flex-direction:column;gap:12px"><div style="font-size:40px;color:var(--td)">doc</div><div style="color:var(--td);font-size:12px">Select a document type and click Generate</div></div>’;
html(‘p-docs’,’<div class="lbl ac">// AI ENGINE</div><div class="ttl">Document Generator</div><div class="sub">Professional documents on demand · capability statements · agreements · assessments</div><div style="display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start"><div style="display:flex;flex-direction:column;gap:12px"><div class="card"><div class="lbl">DOCUMENT TYPE</div>’+dtbtns+’</div><div class="card"><div class="lbl">YOUR DETAILS</div><div style="display:flex;flex-direction:column;gap:8px"><input class="inp" type="text" id="doc-name" value="'+esc(S.docName)+'" placeholder="Your name..." /><input class="inp" type="text" id="doc-co" value="'+esc(S.docCo)+'" placeholder="Your company..." />’+(needsT?’<div class="lbl" style="margin-top:4px;margin-bottom:4px">TARGET COMPANY</div><select id="doc-tsel"><option value="">Select target…</option>’+tOpts+’</select>’:’’)+’</div></div><button class=“btn full” id=“doc-btn”’+(S.docLoading?’ disabled’:’’)+’>’+( S.docLoading?’<span class="spin"></span> GENERATING…’:‘GENERATE DOCUMENT’)+’</button>’+(S.docErr?’<div style="color:var(--red);font-size:11px">’+esc(S.docErr)+’</div>’:’’)+’</div>’+output+’</div>’);
get(‘p-docs’).addEventListener(‘click’,function(e){
var dt=e.target.closest(’[data-dt]’);
if(dt){S.docType=dt.dataset.dt;S.docText=’’;renderDocs();return;}
});
get(‘doc-name’).addEventListener(‘input’,function(){S.docName=this.value;});
get(‘doc-co’).addEventListener(‘input’,function(){S.docCo=this.value;});
if(get(‘doc-tsel’))get(‘doc-tsel’).addEventListener(‘change’,function(){S.docTId=this.value;});
if(get(‘doc-btn’))get(‘doc-btn’).addEventListener(‘click’,genDoc);
if(get(‘doc-copy’))get(‘doc-copy’).addEventListener(‘click’,function(){var el=get(‘doc-out’);navigator.clipboard.writeText(el.innerText||el.textContent);this.textContent=‘COPIED’;setTimeout(function(){if(get(‘doc-copy’))get(‘doc-copy’).textContent=‘COPY ALL’;},2000);});
}

async function genDoc() {
S.docLoading=true;S.docText=’’;S.docErr=’’;renderDocs();
var who=S.docName||‘the consultant’,firm=S.docCo||‘Reclaim Solutions’;
var t=S.targets.find(function(x){return x.id==S.docTId;});
var co=t?t.company:’[CLIENT]’,loc=t?t.location:’’;
var ind=t?t.industry:’’,asts=t?t.assets.join(’, ‘):’’;
var wkrs=t?t.workers:’’,dt=t?t.date:’’;
var lo=t?fmt(t.low):’’,hi=t?fmt(t.high):’’,nt=t?t.notes:’’;
var prompts={
capability:‘Write a professional one-page capability statement for ‘+who+’ at ‘+firm+’, a stranded asset recovery consultant. Sections: What We Do, How It Works (assess, market, close), Our Offer (free assessment, 12% success fee, zero upfront), Who We Serve, Why Work With Us. 350-400 words.’,
agreement:‘Write a professional asset recovery broker agreement between ‘+firm+’ (Broker) and ‘+co+’ (Client)’+(loc?’ in ‘+loc:’’)+’. Sections: Recitals, Scope, Compensation (12% success fee), Exclusivity (90 days), Payment (net 30), Representations, Liability Limitations, Term & Termination, Governing Law (New Jersey), Signatures.’,
assessment:‘Write a one-page asset recovery opportunity assessment for ‘+co+(loc?’ in ‘+loc:’’)+’.’+(ind?’ Industry: ‘+ind+’.’:’’)+(wkrs?’ Workers: ‘+wkrs+’ as of ‘+dt+’.’:’’)+(asts?’ Assets: ‘+asts+’.’:’’)+(nt?’ Context: ‘+nt:’’)+(lo&&hi?’ Estimated recovery: ‘+lo+’-’+hi+’.’:’’)+’\n\nSections: Executive Summary, Asset Overview, Recovery Scenarios, Recommended Channels, Timeline, Next Steps. Professional, CFO-ready.’,
intro:‘Write a short professional email from ‘+who+’ at ‘+firm+’ to the CFO at ‘+co+(loc?’ in ‘+loc:’’)+’.’+(wkrs?’ They had ‘+wkrs+’ workers affected as of ‘+dt+’.’:’’)+(asts?’ Assets include: ‘+asts+’.’:’’)+(nt?’ Notes: ‘+nt:’’)+’ Three short paragraphs. Low-pressure CTA: free assessment, no cost. Subject line first.’,
};
try {
S.docText=await callClaude(‘You are an expert business consultant and professional writer. Write clean professional documents. No markdown code fences.’,prompts[S.docType]);
} catch(e){S.docErr=’Generation failed: ’+e.message;}
S.docLoading=false;renderDocs();
}

/* ── SETTINGS ── */

html(‘p-settings’,’<div class="lbl ac">// SETTINGS</div><div class="ttl">Platform Settings</div><div style="display:flex;flex-direction:column;gap:16px;max-width:560px;margin-top:20px"><div class="card"><div class="lbl ac" style="margin-bottom:12px">// AI ENGINE</div><div style="font-size:11px;color:var(--td);line-height:1.7">All AI features run through a secure server-side proxy. The Anthropic API key is stored in your Netlify environment variables as <span style="color:var(--acc)">ANTHROPIC_KEY</span> and never exposed to the browser.</div><div style="margin-top:10px;font-size:10px;color:var(--grn)">Secure — key lives on the server only</div></div><div class="card"><div class="lbl ac" style="margin-bottom:12px">// ACCESS PASSWORD</div><div style="font-size:11px;color:var(--td);line-height:1.7">Password is set via the <span style="color:var(--acc)">WEBSITE_PW</span> Netlify environment variable.</div></div><div class="card"><div class="lbl ac" style="margin-bottom:12px">// DATA MANAGEMENT</div><div style="font-size:11px;color:var(--td);margin-bottom:12px">Target data and pipeline stages are saved in browser localStorage.</div><button class="btn r" id="clear-btn">CLEAR ALL DATA</button></div></div>’);
get(‘clear-btn’).addEventListener(‘click’,function(){if(window.confirm(‘Clear all data? Cannot be undone.’)){localStorage.removeItem(‘rs-t4’);loadTgts();renderAll();}});
}

/* ── INIT ── */
setupGate();

launchApp();
}

})();
</script>
