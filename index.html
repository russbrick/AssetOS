const res = await fetch(“https://api.anthropic.com/v1/messages”, {
method: “POST”,

“Content-Type”: “application/json”,
“x-api-key”: key,

};

return {…t, stage:STAGES[Math.min(Math.max(i+dir,0),STAGES.length-1)]};

const activePipeline = targets.filter(t=>t.stage!==“Prospecting”&&t.stage!==“Closed”).reduce((s,t)=>s+t.high,0);

const TABS = [
{id:“dashboard”, label:“DASHBOARD”},
{id:“targets”,   label:“TARGETS”},

{id:“buyers”,    label:“BUYERS”},
{id:“pipeline”,  label:“PIPELINE”},
{id:“docs”,      label:“DOCUMENTS”},
{id:“settings”,  label:“SETTINGS”},
];

function App() {
const [authed, setAuthed]     = useState(!!sessionStorage.getItem(“rs-auth”));
const [needsKey, setNeedsKey] = useState(false);
const [tab, setTab]           = useState(“dashboard”);
const [targets, setTargets]   = useState(() => {
try { const s = localStorage.getItem(“rs-targets”); return s ? JSON.parse(s) : TARGETS_INIT; }
catch { return TARGETS_INIT; }
});

useEffect(() => {
if (authed && !localStorage.getItem(“rs-apikey”) && !sessionStorage.getItem(“rs-key-skipped”)) {
setNeedsKey(true);
}
}, [authed]);

useEffect(() => {
try { localStorage.setItem(“rs-targets”, JSON.stringify(targets)); } catch {}
}, [targets]);

const setT = fn => setTargets(prev => typeof fn===“function” ? fn(prev) : fn);

if (!authed) return <PasswordGate onAuth={()=>setAuthed(true)} />;
if (needsKey) return <ApiKeySetup onSave={()=>{ setNeedsKey(false); sessionStorage.setItem(“rs-key-skipped”,“1”); }} />;

const pipeline = targets.filter(t=>t.stage!==“Prospecting”&&t.stage!==“Closed”).reduce((s,t)=>s+t.high,0);
const hasKey   = !!localStorage.getItem(“rs-apikey”);

return (
<div style={{background:C.bg, minHeight:“100vh”, color:C.tx, fontFamily:C.ff}}>
